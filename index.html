<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUNARISE SLIDE DESIGN - V66.5 STABIL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,700;1,400;1,700&family=Montserrat:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&family=EB+Garamond:ital,wght@0,400;0,700;1,400;1,700&family=Josefin+Sans:ital,wght@0,400;0,700;1,400;1,700&family=Righteous&family=Playfair+Display:ital,wght@0,700;0,900;1,700;1,900&family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <style>
        .f-strong-ig { font-family: 'Montserrat', sans-serif; font-weight: 900; font-style: italic; }
        .f-modern-thin { font-family: 'Inter', sans-serif; font-weight: 300; letter-spacing: 0.01em; }
        .f-android { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .f-montserrat { font-family: 'Montserrat', sans-serif; }
        .f-lora { font-family: 'Lora', serif; }
        .f-garamond { font-family: 'EB Garamond', serif; }
        .f-josefin { font-family: 'Josefin Sans', sans-serif; }
        .f-righteous { font-family: 'Righteous', cursive; }
        .f-playfair { font-family: 'Playfair Display', serif; }
        
        .slide-card { position: relative; overflow: hidden; display: flex; flex-direction: column; justify-content: center; padding: 50px; background-size: cover; background-position: center; border-radius: 0px !important; box-sizing: border-box; }
        .ratio-tiktok { width: 400px; aspect-ratio: 9/16; }
        .ratio-ig { width: 400px; aspect-ratio: 4/5; }
        
        /* Area Konten Utama */
        .content-area { width: 100%; display: flex; flex-direction: column; }
        
        /* Elemen Editable Utama */
        .p-wrap { 
            display: block; 
            width: 100%;
            box-sizing: border-box;
            outline: none;
        }

        /* Aturan global untuk setiap baris teks agar peka terhadap text-align */
        .line-item {
            display: block;
            width: 100%;
            min-height: 1.2em;
            margin: 0;
        }

        /* 1. MENGUTIKUTI BARIS KATA (VERSI LAMA) */
        .box-follow-line .line-text { 
            display: inline-block; 
            background-color: var(--box-bg-color) !important; 
            padding: 6px 12px; 
            box-shadow: 8px 0 0 var(--box-bg-color), -8px 0 0 var(--box-bg-color);
            border-radius: 0px;
        }

        /* 2. GAYA INSTAGRAM / WHATSAPP (MENGUTKUTI BARIS LENGKUNG) */
        .box-ig-wa .line-item {
            line-height: 2.2;
        }
        .box-ig-wa .line-text {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 12px;
            background-color: var(--box-bg-color) !important;
        }

        /* 3. GAYA KOTAK BLOK (SQUARE) */
        .box-square .p-wrap { 
            padding: 20px; 
            border-radius: 0px; 
            background-color: var(--box-bg-color);
        }
        
        /* 4. GAYA KOTAK MELENGKUNG (ROUNDED) */
        .box-rounded .p-wrap { 
            padding: 20px; 
            border-radius: 25px; 
            background-color: var(--box-bg-color);
        }
        
        /* 5. TANPA KOTAK */
        .box-none .p-wrap { 
            background: transparent !important; 
            padding: 0px; 
        }
        
        /* Jika tipe kotak adalah Square/Rounded/None, matikan latar belakang individual per baris */
        .box-square .line-text, .box-rounded .line-text, .box-none .line-text {
            background-color: transparent !important;
            padding: 0 !important;
            box-shadow: none !important;
            border-radius: 0 !important;
            display: inline;
        }
        
        .page-indicator { position: absolute; top: 25px; right: 20px; font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 13px; color: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); z-index: 50; }
        
        #mainApp { display: none; }
        .accent-blue { accent-color: #2563eb; }
    </style>
</head>
<body class="bg-zinc-100 p-4">

    <div id="loginPage" class="max-w-md mx-auto mt-20 bg-white p-10 rounded-[2.5rem] shadow-2xl text-center border border-zinc-200">
        <h1 class="font-[900] text-4xl tracking-tighter text-zinc-900 leading-none mb-2 uppercase">LUNARISE<br>SLIDE DESIGN</h1>
        <div class="inline-block bg-blue-600 text-white text-[10px] px-5 py-1.5 rounded-full font-black uppercase tracking-[0.2em] mb-12 shadow-lg">PREMIUM ACCESS</div>
        <input type="text" id="accessKey" placeholder="MASUKKAN KODE" class="w-full p-4 bg-zinc-50 border border-zinc-200 rounded-2xl text-center font-bold outline-none mb-4 text-xs uppercase">
        <button id="loginBtn" onclick="checkKey()" class="w-full bg-zinc-900 text-white py-4 rounded-2xl font-[900] uppercase shadow-xl active:scale-95 text-xs transition-all">AKTIVASI</button>
    </div>

    <div id="mainApp" class="max-w-[1300px] mx-auto">
        <header class="mb-12 text-center">
            <h1 class="font-[900] text-4xl text-zinc-900 tracking-tighter leading-none uppercase">LUNARISE SLIDE DESIGN</h1>
            <div id="expiryBadge" class="bg-blue-600 text-white text-[10px] px-6 py-2 rounded-full font-black mt-3 shadow-lg inline-block uppercase tracking-widest italic">MEMUAT...</div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            <div class="lg:col-span-1 bg-white p-6 rounded-[2rem] shadow-xl space-y-4 text-[11px] h-fit lg:sticky lg:top-4 border border-zinc-200">
                
                <div class="space-y-2 border-b pb-4">
                    <label class="block font-bold text-blue-600 uppercase">Kanvas & Latar</label>
                    <select id="canvasRatio" class="w-full p-2 border rounded-xl font-bold live-update">
                        <option value="ratio-tiktok">TikTok / Reels (9:16)</option>
                        <option value="ratio-ig">Instagram Feed (4:5)</option>
                    </select>
                    <input type="file" id="imgIn" accept="image/*" onchange="handleImg(this)" class="w-full border p-2 rounded-xl">
                    <div class="flex gap-2 items-center">
                        <input type="color" id="bgColor" value="#f4f1ea" class="w-10 h-8 rounded-lg live-update">
                        <span class="flex-1 font-bold uppercase">Latar</span>
                    </div>
                </div>

                <div class="space-y-3 border-b pb-4">
                    <label class="block font-bold text-zinc-700 uppercase">Tipografi</label>
                    <select id="fontStyle" class="w-full p-2 border rounded-xl font-bold live-update">
                        <option value="f-strong-ig">Strong IG</option>
                        <option value="f-modern-thin">Modern Thin</option>
                        <option value="f-android">Default Sistem</option>
                        <option value="f-montserrat">Montserrat</option>
                        <option value="f-lora">Lora</option>
                        <option value="f-garamond">EB Garamond</option>
                        <option value="f-josefin">Josefin Sans</option>
                        <option value="f-righteous">Righteous</option>
                        <option value="f-playfair">Playfair</option>
                    </select>
                    
                    <div class="grid grid-cols-3 gap-1">
                        <button onclick="toggleFormat('bold')" id="btnBold" class="border py-2 rounded-lg font-bold">B</button>
                        <button onclick="toggleFormat('italic')" id="btnItalic" class="border py-2 rounded-lg italic">I</button>
                        <button onclick="toggleFormat('underline')" id="btnUnderline" class="border py-2 rounded-lg underline">U</button>
                    </div>

                    <select id="textAlign" class="w-full p-2 border rounded-xl font-bold live-update">
                        <option value="center">TENGAH</option>
                        <option value="left">KIRI</option>
                        <option value="right">KANAN</option>
                        <option value="justify">RATA KANAN KIRI</option>
                    </select>
                    
                    <div class="flex justify-between font-bold"><span>UKURAN</span><span id="fontSizeVal">18</span></div>
                    <div class="flex items-center gap-2">
                        <button onclick="adjustRange('fontSize', -1)" class="bg-zinc-200 px-3 py-1 rounded font-bold text-sm hover:bg-zinc-300">-</button>
                        <input type="range" id="fontSize" min="10" max="80" value="18" class="flex-1 accent-blue live-update">
                        <button onclick="adjustRange('fontSize', 1)" class="bg-zinc-200 px-3 py-1 rounded font-bold text-sm hover:bg-zinc-300">+</button>
                    </div>

                    <div class="flex gap-2 items-center">
                        <input type="color" id="textColor" value="#000000" class="w-10 h-8 rounded-lg live-update border">
                        <span class="flex-1 font-bold uppercase">Warna Teks</span>
                    </div>
                </div>

                <div class="space-y-3 border-b pb-4">
                    <label class="block font-bold text-blue-600 uppercase">Gaya Kotak</label>
                    <select id="boxType" class="w-full p-2 border rounded-xl font-bold live-update">
                        <option value="box-ig-wa">Gaya IG/WA (Lengkung Kata)</option>
                        <option value="box-follow-line">Mengikuti Baris (Lama)</option>
                        <option value="box-none">Tanpa Kotak</option>
                        <option value="box-square">Kotak Blok (Square)</option>
                        <option value="box-rounded">Kotak Melengkung (Rounded)</option>
                    </select>
                    <div class="flex gap-2 items-center">
                        <input type="color" id="boxColor" value="#ffffff" class="w-10 h-8 rounded-lg live-update">
                        <span class="flex-1 font-bold uppercase">Warna Kotak</span>
                    </div>
                    <div class="flex justify-between font-bold"><span>TRANSPARANSI</span><span id="boxAlphaVal">0</span></div>
                    <div class="flex items-center gap-2">
                        <button onclick="adjustRange('boxAlpha', -5)" class="bg-zinc-200 px-3 py-1 rounded font-bold text-sm hover:bg-zinc-300">-</button>
                        <input type="range" id="boxAlpha" min="0" max="100" value="0" class="w-full accent-blue live-update">
                        <button onclick="adjustRange('boxAlpha', 5)" class="bg-zinc-200 px-3 py-1 rounded font-bold text-sm hover:bg-zinc-300">+</button>
                    </div>
                </div>

                <textarea id="inputText" class="w-full h-40 p-4 border rounded-2xl text-xs outline-none" placeholder="Masukkan naskah..."></textarea>
                <button onclick="activatePreview()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-black uppercase shadow-lg">PRATINJAU</button>
                <button id="btnDownload" onclick="downloadAll()" class="w-full bg-zinc-900 text-white py-3 rounded-xl font-black uppercase">UNDUH PNG</button>
            </div>

            <div class="lg:col-span-3 flex flex-col items-center gap-10 pb-20" id="slideContainer">
                <div class="text-zinc-300 italic mt-20 text-center uppercase tracking-widest font-bold">READY</div>
            </div>
        </div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbx5dYSBwauX7zBDp9NTWRXkFfkvvLMSr7HgBxlU-PnXZ1mQ2-9aI8g81vc4kUQin42Wmw/exec"; 
        
        async function checkKey() {
            const key = document.getElementById('accessKey').value.trim().toUpperCase();
            const btn = document.getElementById('loginBtn');
            if(!key) return alert("Masukkan kode!");
            btn.innerText = "..."; btn.disabled = true;
            try {
                const response = await fetch(WEB_APP_URL, { method: "POST", body: JSON.stringify({ kode: key }) });
                const res = await response.json();
                if(res.status === "success") {
                    document.getElementById('loginPage').style.display = 'none';
                    document.getElementById('mainApp').style.display = 'block';
                    document.getElementById('expiryBadge').innerText = "PREMIUM: " + res.sisaHari + " HARI";
                } else { alert("Kode Salah."); }
            } catch (e) { alert("Error."); }
            btn.innerText = "AKTIVASI"; btn.disabled = false;
        }

        let bgImg = "";
        let isPreviewActive = false;
        let textFormats = { bold: false, italic: false, underline: false };

        function handleImg(input) {
            const reader = new FileReader();
            reader.onload = (e) => { bgImg = e.target.result; if(isPreviewActive) refreshSlidesFromDOM(); };
            reader.readAsDataURL(input.files[0]);
        }

        function toggleFormat(type) {
            textFormats[type] = !textFormats[type];
            document.getElementById('btn' + type.charAt(0).toUpperCase() + type.slice(1)).classList.toggle('bg-zinc-900', textFormats[type]);
            document.getElementById('btn' + type.charAt(0).toUpperCase() + type.slice(1)).classList.toggle('text-white', textFormats[type]);
            if(isPreviewActive) refreshSlidesFromDOM();
        }

        function adjustRange(id, amount) {
            const el = document.getElementById(id);
            let val = parseInt(el.value) + amount;
            if(val < parseInt(el.min)) val = el.min;
            if(val > parseInt(el.max)) val = el.max;
            el.value = val;
            
            document.getElementById(id + 'Val').innerText = val;
            if(isPreviewActive) refreshSlidesFromDOM();
        }

        function activatePreview() { 
            isPreviewActive = true; 
            renderInitialSlides(); 
        }

        document.querySelectorAll('.live-update').forEach(i => i.addEventListener('input', () => { 
            if(i.id === 'fontSize') document.getElementById('fontSizeVal').innerText = i.value;
            if(i.id === 'boxAlpha') document.getElementById('boxAlphaVal').innerText = i.value;
            if(isPreviewActive) refreshSlidesFromDOM(); 
        }));

        function splitContent(text, maxChars = 300) {
            const chunks = [];
            let current = "";
            const sections = text.split(/\n\n+/);
            
            sections.forEach(sec => {
                if ((current + sec).length <= maxChars) {
                    current += sec + "\n\n";
                } else {
                    if(current.trim() !== "") chunks.push(current.trim());
                    current = sec + "\n\n";
                }
            });
            if(current.trim() !== "") chunks.push(current.trim());
            return chunks;
        }

        function hexToRgba(hex, alpha) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r}, ${g}, ${b}, ${alpha / 100})`;
        }

        function renderInitialSlides() {
            const raw = document.getElementById('inputText').value;
            const container = document.getElementById('slideContainer');
            if(!raw.trim()) return;
            
            const chunks = splitContent(raw, 300);
            container.innerHTML = "";
            
            chunks.forEach((chunk) => {
                createSlideElement(chunk);
            });
            updatePageNumbers();
        }

        // Fungsi pembantu untuk mengubah teks baris demi baris menjadi HTML terproteksi kotak kosong
        function convertTextToLinesHTML(text) {
            const lines = text.split('\n');
            let html = '';
            lines.forEach(line => {
                if(line.trim() === "") {
                    // Jika baris kosong (Enter), jangan beri span pembungkus kotak latar belakang!
                    html += `<div class="line-item"><span class="empty-space"></span></div>`;
                } else {
                    html += `<div class="line-item"><span class="line-text">${line}</span></div>`;
                }
            });
            return html;
        }

        function createSlideElement(textTarget, afterElement = null) {
            const container = document.getElementById('slideContainer');
            const wrapper = document.createElement('div');
            wrapper.className = "flex flex-col items-center w-full slide-wrapper";
            
            const card = document.createElement('div');
            card.className = `slide-card shadow-2xl ${document.getElementById('canvasRatio').value}`;
            
            const fontStyleClass = document.getElementById('fontStyle').value;
            const boxType = document.getElementById('boxType').value;
            const align = document.getElementById('textAlign').value;
            
            let htmlContent = `<div class="content-area ${boxType}">`;
            const defaultText = textTarget.trim() !== "" ? textTarget : "Ketik teks di sini...";
            
            htmlContent += `<div class="p-wrap" contenteditable="true">${convertTextToLinesHTML(defaultText)}</div>`;
            htmlContent += `</div>`;
            
            card.innerHTML = `
                <div class="page-indicator">0/0</div>
                <div class="font-wrapper ${fontStyleClass} w-full">${htmlContent}</div>`;
            
            // Mengatasi manipulasi pengetikan langsung di slide card
            const editable = card.querySelector('.p-wrap');
            editable.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    
                    const selection = window.getSelection();
                    if (!selection.rangeCount) return;
                    const range = selection.getRangeAt(0);
                    
                    // Membuat elemen baris kosong murni yang dijamin bebas dari render kotak latar belakang
                    const newLine = document.createElement('div');
                    newLine.className = "line-item";
                    newLine.innerHTML = `<span class="empty-space"></span>`;
                    
                    range.deleteContents();
                    range.insertNode(newLine);
                    
                    // Letakkan kursor masuk ke dalam baris kosong yang baru dibuat agar sinkron saat diketik lagi
                    range.setStartAfter(newLine);
                    range.setEndAfter(newLine);
                    selection.removeAllRanges();
                    selection.addRange(range);
                    
                    updatePageNumbers();
                    applyStylesToCard(card);
                }
            });

            // Sinkronisasi gaya real-time saat teks diketik langsung di dalam card
            editable.addEventListener('input', function() {
                updatePageNumbers();
            });

            const controls = document.createElement('div');
            controls.className = "flex gap-4 mt-3 no-capture"; 
            
            const addBtn = document.createElement('button');
            addBtn.className = "bg-blue-600 hover:bg-blue-700 text-white font-bold text-[10px] px-4 py-1.5 rounded-full uppercase tracking-wider shadow";
            addBtn.innerText = "+ Tambah Slide";
            addBtn.onclick = () => { createSlideElement("", wrapper); };
            
            const delBtn = document.createElement('button');
            delBtn.className = "bg-red-500 hover:bg-red-600 text-white font-bold text-[10px] px-4 py-1.5 rounded-full uppercase tracking-wider shadow";
            delBtn.innerText = "🗑️ Hapus";
            delBtn.onclick = () => { wrapper.remove(); updatePageNumbers(); };
            
            controls.appendChild(addBtn);
            controls.appendChild(delBtn);
            
            wrapper.appendChild(card);
            wrapper.appendChild(controls);
            
            if(afterElement) {
                afterElement.parentNode.insertBefore(wrapper, afterElement.nextSibling);
            } else {
                container.appendChild(wrapper);
            }
            
            applyStylesToCard(card);
            updatePageNumbers();
        }

        function applyStylesToCard(card) {
            card.style.backgroundImage = bgImg ? `url(${bgImg})` : 'none';
            card.style.backgroundColor = bgImg ? 'transparent' : document.getElementById('bgColor').value;
            
            const boxColor = hexToRgba(document.getElementById('boxColor').value, document.getElementById('boxAlpha').value);
            const align = document.getElementById('textAlign').value;
            const boxType = document.getElementById('boxType').value;
            const fontStyleClass = document.getElementById('fontStyle').value;
            
            card.style.setProperty('--box-bg-color', boxColor);

            const contentArea = card.querySelector('.content-area');
            if(contentArea) {
                contentArea.className = `content-area ${boxType}`;
            }
            
            const fontWrapper = card.querySelector('.font-wrapper');
            if(fontWrapper) {
                fontWrapper.className = `font-wrapper ${fontStyleClass} w-full`;
            }
            
            const wraps = card.querySelectorAll('.p-wrap');
            wraps.forEach(w => {
                w.style.color = document.getElementById('textColor').value;
                w.style.fontSize = document.getElementById('fontSize').value + 'px';
                w.style.fontWeight = textFormats.bold ? 'bold' : 'normal';
                w.style.fontStyle = textFormats.italic ? 'italic' : 'normal';
                w.style.textDecoration = textFormats.underline ? 'underline' : 'none';
                w.style.textAlign = align;
            });

            // Atur perataan posisi per baris item secara konsisten sesuai pilihan menu perataan teks
            const lineItems = card.querySelectorAll('.line-item');
            lineItems.forEach(item => {
                item.style.textAlign = align;
            });

            const lineTexts = card.querySelectorAll('.line-text');
            lineTexts.forEach(s => {
                if(boxType === 'box-ig-wa' || boxType === 'box-follow-line') {
                    s.style.backgroundColor = boxColor;
                } else {
                    s.style.backgroundColor = 'transparent';
                }
            });
        }

        function refreshSlidesFromDOM() {
            const cards = document.querySelectorAll('.slide-card');
            cards.forEach(card => {
                card.className = `slide-card shadow-2xl ${document.getElementById('canvasRatio').value}`;
                applyStylesToCard(card);
            });
        }

        function updatePageNumbers() {
            const wrappers = document.querySelectorAll('.slide-wrapper');
            wrappers.forEach((wrap, idx) => {
                const indicator = wrap.querySelector('.page-indicator');
                if(indicator) {
                    indicator.innerText = `${idx + 1}/${wrappers.length}`;
                }
            });
        }

        async function downloadAll() {
            const wrappers = document.querySelectorAll('.slide-wrapper');
            const btn = document.getElementById('btnDownload');
            if(wrappers.length === 0) return;
            btn.innerText = "..."; btn.disabled = true;
            
            for(let i=0; i<wrappers.length; i++) {
                const card = wrappers[i].querySelector('.slide-card');
                const controls = wrappers[i].querySelector('.no-capture');
                
                if(controls) controls.style.display = 'none';
                
                const canvas = await html2canvas(card, { 
                    scale: 3, 
                    useCORS: true,
                    allowTaint: true,
                    scrollX: 0,
                    scrollY: -window.scrollY,
                    windowWidth: document.documentElement.offsetWidth,
                    windowHeight: document.documentElement.offsetHeight
                });
                
                if(controls) controls.style.display = 'flex';
                
                const link = document.createElement('a');
                link.download = `SLIDE_${Date.now()}_${i+1}.png`;
                link.href = canvas.toDataURL('image/png');
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                
                await new Promise(r => setTimeout(r, 600));
            }
            btn.innerText = "UNDUH PNG"; btn.disabled = false;
        }
    </script>
</body>
</html>
